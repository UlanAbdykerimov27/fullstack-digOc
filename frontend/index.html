<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ulan's Lab</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top left, #3f3d9c, transparent 30%),
        radial-gradient(circle at bottom right, #6d4cff, transparent 30%),
        linear-gradient(135deg, #0f172a, #24124d);
      overflow: hidden;
      padding: 20px;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(5px);
    }

    .circle.one {
      width: 120px;
      height: 120px;
      top: 120px;
      right: 140px;
    }

    .circle.two {
      width: 70px;
      height: 70px;
      bottom: 90px;
      left: 80px;
    }

    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      position: relative;
      z-index: 2;
    }

    .topbar {
      padding: 35px 45px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ececec;
    }

    .title-area {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6d4cff, #7d6bff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }

    .title-area h1 {
      color: #1e1b4b;
      font-size: 34px;
    }

    .title-area p {
      color: #7c83a3;
      margin-top: 5px;
      font-size: 18px;
    }

    .theme-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #f4f4f7;
      font-size: 28px;
      cursor: pointer;
      transition: 0.2s;
    }

    .theme-btn:hover {
      transform: scale(1.05);
    }

    .content {
      padding: 35px;
    }

    .add-box {
      background: #f3f0ff;
      border: 2px solid #e2dcff;
      border-radius: 22px;
      padding: 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 30px;
    }

    .plus {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6d4cff, #5a4bff);
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    input {
      flex: 1;
      height: 65px;
      border-radius: 18px;
      border: 2px solid #ddd6ff;
      padding: 0 22px;
      font-size: 18px;
      outline: none;
    }

    .add-btn {
      height: 65px;
      border: none;
      border-radius: 18px;
      padding: 0 35px;
      background: linear-gradient(135deg, #6d4cff, #5a4bff);
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .tasks {
      background: white;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .tasks-header h2 {
      color: #1e1b4b;
      font-size: 28px;
    }

    .counter {
      background: #f2f0ff;
      color: #5a4bff;
      padding: 10px 18px;
      border-radius: 30px;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      background: #fafaff;
      border: 1px solid #ececff;
      border-radius: 18px;
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      transition: 0.2s;
    }

    li:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .task-text {
      font-size: 18px;
      color: #2b2b52;
    }

    .delete-btn {
      border: none;
      background: #ffe8ee;
      color: #ff4d6d;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .footer {
      margin-top: 30px;
      background: #f4f1ff;
      border-radius: 20px;
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      color: #6b6b9d;
      font-size: 15px;
    }

    @media(max-width: 768px) {
      .add-box {
        flex-direction: column;
      }

      input,
      .add-btn {
        width: 100%;
      }

      .topbar {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="circle one"></div>
  <div class="circle two"></div>

  <div class="container">

    <div class="topbar">
      <div class="title-area">
        <div class="logo">✦</div>

        <div>
          <h1>Ulan's Lab</h1>
          <p>Group: Comse-23</p>
        </div>
      </div>

      <button class="theme-btn">☾</button>
    </div>

    <div class="content">

      <div class="add-box">
        <button class="plus">+</button>

        <input
          type="text"
          id="dataInput"
          placeholder="Введите новую запись..."
        >

        <button class="add-btn" id="addBtn">
          Добавить
        </button>
      </div>

      <div class="tasks">

        <div class="tasks-header">
          <h2>Мои записи</h2>

          <div class="counter" id="counter">
            0 записей
          </div>
        </div>

        <ul id="list"></ul>

      </div>

      <div class="footer">
        <span>Simple Task Manager</span>
        <span id="date"></span>
      </div>

    </div>

  </div>

  <script>
    const input = document.getElementById('dataInput');
    const btn = document.getElementById('addBtn');
    const list = document.getElementById('list');
    const counter = document.getElementById('counter');

    let records = [];

    function updateCounter() {
      counter.textContent = `${records.length} записей`;
    }

    function renderList() {
      list.innerHTML = '';

      records.forEach((item, index) => {
        const li = document.createElement('li');

        li.innerHTML = `
          <span class="task-text">${item}</span>

          <button class="delete-btn" onclick="deleteRecord(${index})">
            Delete
          </button>
        `;

        list.appendChild(li);
      });

      updateCounter();
    }

    function addRecord() {
      const text = input.value.trim();

      if (!text) return;

      records.push(text);

      input.value = '';

      renderList();
    }

    function deleteRecord(index) {
      records.splice(index, 1);
      renderList();
    }

    btn.addEventListener('click', addRecord);

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addRecord();
      }
    });

    document.getElementById('date').textContent =
      new Date().toLocaleDateString('ru-RU');

    renderList();
  </script>

</body>
</html>
